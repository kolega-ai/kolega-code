        def _interpret_color(color: int | tuple[int, int, int] | str, offset: int = 0) -> str:
            """Return the ANSI escape parameters for a named or numeric color.

            ``color`` may be one of the names in :data:`_ansi_colors`, an integer
            in the 256-color range, or an ``(r, g, b)`` tuple. ``offset`` is added
            to named color codes so the same lookup can produce foreground (``0``)
            or background (``10``) sequences.
            """
            if isinstance(color, int):
                return f"{38 + offset};5;{color:d}"

            if isinstance(color, (tuple, list)):
                r, g, b = color
                return f"{38 + offset};2;{r:d};{g:d};{b:d}"

            return str(_ansi_colors[color] + offset)
