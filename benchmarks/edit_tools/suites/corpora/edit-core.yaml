            /// <summary>
            /// Determines whether a child layout with the specified name exists.
            /// </summary>
            /// <param name="name">The layout name to look for.</param>
            /// <returns><c>true</c> if a matching layout exists; otherwise <c>false</c>.</returns>
            public bool ContainsLayout(string name)
            {
                if (string.IsNullOrEmpty(name))
                {
                    return false;
                }

                var stack = new Stack<Layout>();
                stack.Push(this);

                while (stack.Count > 0)
                {
                    var current = stack.Pop();
                    if (name.Equals(current.Name, StringComparison.OrdinalIgnoreCase))
                    {
                        return true;
                    }

                    foreach (var layout in current.GetChildren())
                    {
                        stack.Push(layout);
                    }
                }

                return false;
            }

