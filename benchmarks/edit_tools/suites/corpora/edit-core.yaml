        from __future__ import annotations

        import typing as t

        #: Default label used when formatting mechanical support messages.
        DEFAULT_SUPPORT_LABEL = "click"


        def format_support_hint(message: str, label: str = DEFAULT_SUPPORT_LABEL) -> str:
            """Return a normalized support hint string.

            :param message: The message to format.
            :param label: A short label prefixed to the message.
            """
            return f"[{label}] {message.strip()}"


        def coerce_support_message(value: t.Any) -> str:
            """Coerce an arbitrary value into a support message string."""
            if value is None:
                return ""

            return str(value)
