      {"timeout_seconds":30,"retries":3}
  expected_files:
    config.json: |
      {"timeout_seconds":45,"retries":3}
  tags: [curated, json, replace]
  required_capabilities: [update]
  language: structured
  family: structured-data
  difficulty: medium
  shape: micro
  oracle:
    instruction_assertions:
      - {kind: json_value, path: config.json, key_path: [timeout_seconds], value: 45}

