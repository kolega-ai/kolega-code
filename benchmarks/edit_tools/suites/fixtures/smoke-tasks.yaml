- id: rust-two-constants
  prompt: In `src/limits.rs`, set `SOFT_LIMIT` to 80 and `HARD_LIMIT` to 100, leaving the comment unchanged.
  before_files:
    src/limits.rs: |
      // Request limits
      pub const SOFT_LIMIT: u16 = 50;
      pub const HARD_LIMIT: u16 = 75;
  expected_files:
    src/limits.rs: |
      // Request limits
      pub const SOFT_LIMIT: u16 = 80;
      pub const HARD_LIMIT: u16 = 100;
  tags: [curated, single-file, multi-hunk]
  required_capabilities: [update]
  language: rust
  family: same-file-multi-hunk
  difficulty: medium
  shape: micro

- id: coordinated-version
