- id: crlf-preservation
  prompt: In `windows.ini`, change `enabled=false` to `enabled=true` while preserving CRLF line endings.
  before_files:
    windows.ini: {text: "[feature]\r\nenabled=false\r\n"}
  expected_files:
    windows.ini: {text: "[feature]\r\nenabled=true\r\n"}
  tags: [curated, crlf, replace]
  required_capabilities: [update]
  language: text
  family: localized-replacement
  difficulty: hard
  shape: micro
  oracle:
    instruction_assertions:
      - {kind: line_endings, path: windows.ini, value: crlf}

- id: json-timeout
  prompt: Change only `timeout_seconds` to 45 in `config.json` and preserve the existing compact formatting.
  before_files:
