- id: python-literal
  prompt: Set `MAX_RETRIES` to 5 in `src/config.py`. Do not change `TIMEOUT`.
  before_files:
    src/config.py: |
      MAX_RETRIES = 3
      TIMEOUT = 30
  expected_files:
    src/config.py: |
      MAX_RETRIES = 5
      TIMEOUT = 30
  tags: [curated, single-file, replace]
  required_capabilities: [update]
  language: python
  family: localized-replacement
  difficulty: easy
  shape: micro

- id: python-insert-function
  prompt: Add `is_even(value)` above `double` in `math_utils.py`; it must return `value % 2 == 0`.
  before_files:
    math_utils.py: |
      def double(value):
          return value * 2
  expected_files:
    math_utils.py: |
      def is_even(value):
          return value % 2 == 0

      def double(value):
          return value * 2
  tags: [curated, single-file, insert]
  required_capabilities: [update]
  language: python
  family: block-insertion
  difficulty: medium
  shape: micro
  oracle:
    exact_tree: false
    functional_assertions:
      - {kind: contains, path: math_utils.py, value: 'def is_even(value):'}
      - {kind: contains, path: math_utils.py, value: 'return value % 2 == 0'}
    instruction_assertions:
      - {kind: contains, path: math_utils.py, value: 'return value * 2'}

- id: typescript-remove-export
  prompt: Remove only the `legacyMode` export from `src/flags.ts`.
  before_files:
