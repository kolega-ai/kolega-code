      export const darkMode = true;
      export const legacyMode = false;
      export const tracing = true;
  expected_files:
    src/flags.ts: |
      export const darkMode = true;
      export const tracing = true;
  tags: [curated, single-file, remove]
  required_capabilities: [update]
  language: typescript
  family: targeted-removal
  difficulty: easy
  shape: micro

- id: create-changelog
