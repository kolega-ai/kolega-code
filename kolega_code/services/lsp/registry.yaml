# Language presets for the Kolega Code LSP integration.
# Each entry maps a stable language_id to its detection criteria and available servers.
#
# key: language_id (used in code and config)
#   display_name:        Human-readable name
#   config_files:        Project-root files that strongly indicate this language (may include globs)
#   extensions:          Dot-prefixed file extensions
#   filename_map:        Exact filenames that route to this language
#   family:              (optional) Reuse another language's server
#   language_servers:    Ordered list (first match on PATH wins)
#     - name:            Human-readable server name
#       bin:             Executable name (resolved via shutil.which)
#       args:            Default CLI arguments
#       install_commands: Platform-keyed install instructions

python:
  display_name: Python
  config_files: [pyproject.toml, setup.py, Pipfile]
  extensions: [.py, .pyi]
  filename_map: {}
  language_servers:
    - name: pyright
      bin: pyright-langserver
      args: [--stdio]
      install_commands:
        darwin: [brew install pyright]
        linux: [pip install pyright]
    - name: basedpyright
      bin: basedpyright-langserver
      args: [--stdio]
      install_commands:
        darwin: [pip install basedpyright]
        linux: [pip install basedpyright]
    - name: ruff-lsp
      bin: ruff-lsp
      args: []
      install_commands:
        darwin: [pip install ruff-lsp]
        linux: [pip install ruff-lsp]

