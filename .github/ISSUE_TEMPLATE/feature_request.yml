name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what makes it hard today?
      placeholder: "I want to ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Kolega Code to do?
      placeholder: "It would be useful if ..."
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.5, Ubuntu 24.04, Fedora 42, etc."
    validations:
      required: false

  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "Ghostty + zsh, Terminal.app + zsh, iTerm2 + fish, GNOME Terminal + bash"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, alternatives considered, screenshots, or links if useful.
    validations:
      required: false
