name: Bug report
description: Report a reproducible problem with Kolega Code
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: "Kolega Code ..."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kolega Code version
      description: Run `kolega-code --version`.
      placeholder: "kolega-code 0.8.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.5, Ubuntu 24.04, Fedora 42, etc."
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      description: Include terminal app and shell if relevant.
      placeholder: "Ghostty + zsh, Terminal.app + zsh, iTerm2 + fish, GNOME Terminal + bash"
    validations:
      required: true

  - type: input
    id: install-method
    attributes:
      label: Install method
      placeholder: "install script, uv tool install, pipx, pip"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Keep this as small and specific as possible.
      placeholder: |
        1. Run `kolega-code .`
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected ..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "Instead ..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output. Please remove API keys, tokens, project-private code, and other secrets.
      render: shell
    validations:
      required: false
