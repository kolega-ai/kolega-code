name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run fast tests with coverage
        run: ./run_tests.sh --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml-python-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

  coverage-badge:
    name: Update coverage badge
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Download Python 3.11 coverage report
        uses: actions/download-artifact@v6
        with:
          name: coverage-xml-python-3.11
          path: coverage-artifact

      - name: Generate coverage badge
        run: |
          uv run genbadge coverage -i coverage-artifact/coverage.xml -o docs/src/assets/coverage.svg
          python - <<'PY'
          from pathlib import Path

          badge = Path("docs/src/assets/coverage.svg")
          badge.write_text(badge.read_text().rstrip("\n") + "\n")
          PY

      - name: Commit coverage badge
        run: |
          if [ -z "$(git status --porcelain -- docs/src/assets/coverage.svg)" ]; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/src/assets/coverage.svg
          git commit -m "chore: update coverage badge [skip ci]"
          git push

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Audit locked dependencies
        run: uv audit --locked
