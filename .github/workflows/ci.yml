name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      coverage-badge-only: ${{ steps.detect.outputs.coverage-badge-only }}
    steps:
      - name: Detect coverage-badge-only change
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          elif [ "${{ github.event_name }}" = "push" ]; then
            files=$(gh api "repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}" --jq '.files[].filename')
          else
            echo "coverage-badge-only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$files"

          file_count=$(printf '%s\n' "$files" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$file_count" = "1" ] && [ "$files" = "docs/src/assets/coverage.svg" ]; then
            echo "coverage-badge-only=true" >> "$GITHUB_OUTPUT"
          else
            echo "coverage-badge-only=false" >> "$GITHUB_OUTPUT"
          fi

  tests:
    name: Python ${{ matrix.python-version }}
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Skip coverage-badge-only change
        if: needs.changes.outputs.coverage-badge-only == 'true'
        run: echo "Skipping Python checks for coverage badge-only change."

      - name: Checkout
        if: needs.changes.outputs.coverage-badge-only != 'true'
        uses: actions/checkout@v5

      - name: Setup Python
        if: needs.changes.outputs.coverage-badge-only != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        if: needs.changes.outputs.coverage-badge-only != 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        if: needs.changes.outputs.coverage-badge-only != 'true'
        run: uv sync --extra dev --frozen

      - name: Run pre-commit hooks
        if: needs.changes.outputs.coverage-badge-only != 'true'
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run fast tests with coverage
        if: needs.changes.outputs.coverage-badge-only != 'true'
        run: ./run_tests.sh --coverage

      - name: Upload coverage report
        if: needs.changes.outputs.coverage-badge-only != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml-python-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

  coverage-badge:
    name: Update coverage badge
    needs: [changes, tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.coverage-badge-only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Download Python 3.11 coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-xml-python-3.11
          path: coverage-artifact

      - name: Generate coverage badge
        run: |
          uv run genbadge coverage -i coverage-artifact/coverage.xml -o docs/src/assets/coverage.svg
          python - <<'PY'
          from pathlib import Path

          badge = Path("docs/src/assets/coverage.svg")
          badge.write_text(badge.read_text().rstrip("\n") + "\n")
          PY

      - name: Create coverage badge pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: docs/src/assets/coverage.svg
          commit-message: "chore: update coverage badge"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          branch: chore/update-coverage-badge
          delete-branch: true
          title: "chore: update coverage badge"
          body: |
            Automated coverage badge update from CI after tests passed on `main`.

      - name: Enable auto-merge for coverage badge PR
        if: steps.cpr.outputs.pull-request-number != '' && steps.cpr.outputs.pull-request-operation != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash --delete-branch

  dependency-audit:
    name: Dependency audit
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip coverage-badge-only change
        if: needs.changes.outputs.coverage-badge-only == 'true'
        run: echo "Skipping dependency audit for coverage badge-only change."

      - name: Checkout
        if: needs.changes.outputs.coverage-badge-only != 'true'
        uses: actions/checkout@v5

      - name: Setup Python
        if: needs.changes.outputs.coverage-badge-only != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        if: needs.changes.outputs.coverage-badge-only != 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Audit locked dependencies
        if: needs.changes.outputs.coverage-badge-only != 'true'
        run: uv audit --locked
