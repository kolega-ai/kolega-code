name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build and test package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          with open("pyproject.toml", "rb") as fh:
              version = tomllib.load(fh)["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              print(f"Release tag {tag!r} does not match pyproject.toml version {version!r}; expected {expected!r}.")
              sys.exit(1)
          PY

      - name: Run tests
        run: python -m pytest -ra --durations=50 --import-mode=importlib -m "not slow"

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/kolega-code-smoke
          /tmp/kolega-code-smoke/bin/python -m pip install --upgrade pip
          /tmp/kolega-code-smoke/bin/python -m pip install dist/*.whl
          /tmp/kolega-code-smoke/bin/kolega-code --version

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kolega-code
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Create release
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists."
            exit 0
          fi

          version="${GITHUB_REF_NAME#v}"
          prelude=$(printf '%s\n\n%s\n\n%s\n%s\n%s\n\n%s\n' \
            "PyPI: https://pypi.org/project/kolega-code/${version}/" \
            "Update with:" \
            '```bash' \
            'uv tool install --force kolega-code' \
            '```' \
            "PyPI is the canonical package distribution. GitHub provides source archives for this release."
          )

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --latest \
            --generate-notes \
            --notes "$prelude"
